<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim | Complete Solutions Center</title>
    <style>
        /* Premium Dark Luxury Theme */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0b0c10; 
            color: #e5e7eb; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { 
            text-align: center; 
            padding: 3.5rem 1rem 2rem 1rem; 
            max-width: 800px;
        }

        header h1 { 
            font-size: 2.5rem; 
            font-weight: 700; 
            letter-spacing: 1px; 
            margin: 0 0 0.5rem 0;
            color: #ffffff;
        }

        header p { 
            color: #9ca3af; 
            font-size: 0.95rem; 
            letter-spacing: 0.5px;
            margin: 0;
        }

        .container { 
            width: 100%;
            max-width: 850px; 
            padding: 0 1.5rem; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* Service Matrix */
        .services-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.25rem; 
        }

        .service-card { 
            background: #14161d; 
            border: 1px solid #222530;
            padding: 2.5rem 1.5rem; 
            border-radius: 16px; 
            text-align: center; 
            font-weight: 600; 
            font-size: 1.1rem;
            color: #ffffff;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: #10b981;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
        }

        .service-icon {
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .whatsapp-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .whatsapp-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ibrahim</h1>
        <p>Complete Solutions Center | Salla Stores • Photography • Design</p>
    </header>

    <div class="container">
        <div class="services-grid">
            <div class="service-card">
                <span class="service-icon">📸</span>
                Product Photography
            </div>
            <div class="service-card">
                <span class="service-icon">🛒</span>
                Salla Store Setup
            </div>
            <div class="service-card">
                <span class="service-icon">🎨</span>
                Social Media Posters
            </div>
        </div>

        <div class="whatsapp-wrapper">
            <a href="https://wa.me/966534657849" target="_blank" class="whatsapp-btn">
                <span>Chat on WhatsApp</span>
            </a>
        </div>
    </div>

    <script type="text/javascript">
      (function(d, t) {
          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
          v.onload = function() {
            window.voiceflow.chat.load({
              verify: { projectID: '6a25a7ff2d3a498b7f05ef64' },
              url: 'https://general-runtime.voiceflow.com',
              voice: {
                url: "https://runtime-api.voiceflow.com"
              }
            });
          }
          v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
      })(document, 'script');
    </script>
</body>
</html>
