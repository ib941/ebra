<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim | Complete Design Solutions</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 0; }
        header { background-color: #1a1a1a; color: white; padding: 2rem; text-align: center; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .services { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .service-card { background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; text-align: center; font-weight: bold; }
        .chat-container { background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; height: 450px; }
        .chat-header { background: #0056b3; color: white; padding: 1rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .key-input { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; outline: none; width: 140px; }
        .key-input::placeholder { color: rgba(255,255,255,0.6); }
        .chat-history { flex: 1; padding: 1rem; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .bot-msg { background: #e9ecef; align-self: flex-start; }
        .user-msg { background: #0056b3; color: white; align-self: flex-end; }
        .chat-input { display: flex; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; padding: 1rem; border: none; outline: none; }
        .chat-input button { background: #0056b3; color: white; border: none; padding: 0 1.5rem; cursor: pointer; font-weight: bold; }
        .chat-input button:hover { background: #004494; }
    </style>
</head>
<body>

    <header>
        <h1>Ibrahim</h1>
        <p>Complete Solutions Center | Salla Stores • Photography • Design</p>
    </header>

    <div class="container">
        <div class="services">
            <div class="service-card">📸 Product Photography</div>
            <div class="service-card">🛒 Salla Store Setup</div>
            <div class="service-card">🎨 Social Media Posters</div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <span>Chat with Ibrahim's AI Assistant</span>
                <input type="password" id="apiKeySlot" class="key-input" placeholder="Paste Gemini API Key...">
            </div>
            <div class="chat-history" id="chatHistory">
                <div class="message bot-msg">Hi! I'm Ibrahim's AI assistant. Ask me about his services, his portfolio, or setting up a Google Meet!</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Type your message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const chatHistory = document.getElementById('chatHistory');
        const apiKeySlot = document.getElementById('apiKeySlot');

        // Automatically load the key if saved before
        if (localStorage.getItem('my_saved_key')) {
            apiKeySlot.value = localStorage.getItem('my_saved_key');
        }

        // Save key when changed
        apiKeySlot.addEventListener('input', () => {
            localStorage.setItem('my_saved_key', apiKeySlot.value);
        });

        // The master prompt instructing the AI how to act as you
        const systemInstruction = `You are the digital assistant for Ibrahim, a professional graphic designer and e-commerce manager who acts as a complete solutions center for his clients. Your goal is to answer client questions politely, professionally, and concisely. 

        Services: If asked about work, explain that Ibrahim specializes in high-end product photography (frequently working with perfume manufacturing clients), building and managing Salla e-commerce stores, and creating digital product designs and social media posters.

        Personal Life: If asked about his free time, casually mention that as the oldest sibling, he values spending time chatting with his family and friends. He also relaxes by watching football—especially following FC Barcelona and AC Milan—and playing video games like eFootball, Hollow Knight, and Sky: Children of the Light.

        Meetings: If a client asks for a meeting, phone call, or in-person meetup, politely inform them that Ibrahim conducts all client consultations exclusively via Google Meet. Ask them what day works best and let them know Ibrahim will send a Google Meet link.

        Always be helpful and friendly. Do not invent any services or personal details not listed here. Respond in the same language the user uses.`;

        let conversationHistory = [];

        sendBtn.addEventListener('click', async () => {
            const query = userInput.value.trim();
            const apiKey = apiKeySlot.value.trim();
            
            if (!query) return;
            if (!apiKey) {
                alert("Please paste your Gemini API Key in the top-right corner slot of the chat widget first!");
                return;
            }
            
            // 1. Render user message
            chatHistory.innerHTML += `<div class="message user-msg">${query}</div>`;
            userInput.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // 2. Add placeholder thinking message
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message bot-msg';
            thinkingDiv.innerText = 'Thinking...';
            chatHistory.appendChild(thinkingDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // 3. Build history payload for the API
            conversationHistory.push({ role: "user", parts: [{ text: query }] });

            try {
                // Call the live Gemini model
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        contents: conversationHistory
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // 4. Update UI with real response
                thinkingDiv.innerText = aiText;
                conversationHistory.push({ role: "model", parts: [{ text: aiText }] });

            } catch (error) {
                console.error(error);
                thinkingDiv.innerText = "Error connecting to the AI brain. Double-check your API key.";
            }
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
        });
    </script>
</body>
</html>
