<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim | Complete Solutions Center</title>
    <style>
        /* Dark Luxury Global Theme */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0b0c10; 
            color: #e5e7eb; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { 
            text-align: center; 
            padding: 3rem 1rem 1.5rem 1rem; 
            max-width: 800px;
        }

        header h1 { 
            font-size: 2.5rem; 
            font-weight: 700; 
            letter-spacing: 1px; 
            margin: 0 0 0.5rem 0;
            color: #ffffff;
        }

        header p { 
            color: #9ca3af; 
            font-size: 0.95rem; 
            letter-spacing: 0.5px;
            margin: 0;
        }

        .container { 
            width: 100%;
            max-width: 850px; 
            padding: 0 1.5rem; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* Premium Service Cards Matrix */
        .services-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.25rem; 
        }

        .service-card { 
            background: #14161d; 
            border: 1px solid #222530;
            padding: 2.5rem 1.5rem; 
            border-radius: 16px; 
            text-align: center; 
            font-weight: 600; 
            font-size: 1.1rem;
            color: #ffffff;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        /* Cards only glow on hover now */
        .service-card:hover {
            transform: translateY(-5px);
            border-color: #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.25);
        }

        .service-icon {
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        /* Integrated Dark AI Chat Widget */
        .chat-container { 
            background: #14161d; 
            border: 1px solid #222530;
            border-radius: 16px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 480px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .chat-header { 
            background: #1c1e27; 
            border-bottom: 1px solid #222530;
            padding: 1.25rem; 
            font-weight: 600; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .chat-header span {
            color: #ffffff;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header span::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
        }

        .key-input { 
            background: #0b0c10; 
            border: 1px solid #2d313f; 
            color: #ffffff; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 12px; 
            outline: none; 
            width: 160px; 
            transition: border-color 0.3s;
        }
        
        .key-input:focus {
            border-color: #00f2fe;
        }

        .chat-history { 
            flex: 1; 
            padding: 1.25rem; 
            overflow-y: auto; 
            background: #0f1015; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .message { 
            padding: 12px 16px; 
            border-radius: 14px; 
            max-width: 75%; 
            line-height: 1.5; 
            font-size: 0.95rem;
        }

        .bot-msg { 
            background: #1c1e27; 
            color: #e5e7eb;
            align-self: flex-start; 
            border-bottom-left-radius: 4px;
            border: 1px solid #222530;
        }

        .user-msg { 
            background: #00f2fe; 
            color: #0b0c10; 
            font-weight: 500;
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
        }

        .chat-input { 
            display: flex; 
            background: #1c1e27;
            border-top: 1px solid #222530; 
            padding: 8px;
        }

        .chat-input input { 
            flex: 1; 
            padding: 1rem; 
            background: transparent;
            border: none; 
            outline: none; 
            color: #ffffff;
            font-size: 0.95rem;
        }

        .chat-input button { 
            background: #00f2fe; 
            color: #0b0c10; 
            border: none; 
            padding: 0 1.75rem; 
            border-radius: 10px;
            cursor: pointer; 
            font-weight: 600; 
            transition: opacity 0.2s;
        }

        .chat-input button:hover { 
            opacity: 0.9;
        }

        /* Custom WhatsApp Button Element */
        .whatsapp-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .whatsapp-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ibrahim</h1>
        <p>Complete Solutions Center | Salla Stores • Photography • Design</p>
    </header>

    <div class="container">
        <div class="services-grid">
            <div class="service-card">
                <span class="service-icon">📸</span>
                Product Photography
            </div>
            <div class="service-card">
                <span class="service-icon">🛒</span>
                Salla Store Setup
            </div>
            <div class="service-card">
                <span class="service-icon">🎨</span>
                Social Media Posters
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <span>AI Business Assistant</span>
                <input type="password" id="apiKeySlot" class="key-input" placeholder="Paste Gemini API Key...">
            </div>
            <div class="chat-history" id="chatHistory">
                <div class="message bot-msg">Hi! I'm Ibrahim's AI assistant. Ask me about his services, his portfolio, or setting up a Google Meet!</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Type your message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>

        <div class="whatsapp-wrapper">
            <a href="https://wa.me/966534657849" target="_blank" class="whatsapp-btn">
                <span>Chat on WhatsApp</span>
            </a>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const chatHistory = document.getElementById('chatHistory');
        const apiKeySlot = document.getElementById('apiKeySlot');

        if (localStorage.getItem('my_saved_key')) {
            apiKeySlot.value = localStorage.getItem('my_saved_key');
        }

        apiKeySlot.addEventListener('input', () => {
            localStorage.setItem('my_saved_key', apiKeySlot.value);
        });

        const systemInstruction = `You are the digital assistant for Ibrahim, a professional graphic designer and e-commerce manager who acts as a complete solutions center for his clients. Your goal is to answer client questions politely, professionally, and concisely. 

        Services: If asked about work, explain that Ibrahim specializes in high-end product photography (frequently working with perfume manufacturing clients), building and managing Salla e-commerce stores, and creating digital product designs and social media posters.

        Personal Life: If asked about his free time, casually mention that as the oldest sibling, he values spending time chatting with his family and friends. He also relaxes by watching football—especially following FC Barcelona and AC Milan—and playing video games like eFootball, Hollow Knight, and Sky: Children of the Light.

        Meetings: If a client asks for a meeting, phone call, or in-person meetup, politely inform them that Ibrahim conducts all client consultations exclusively via Google Meet. Ask them what day works best and let them know Ibrahim will send a Google Meet link.

        Always be friendly. Do not invent any details. Respond in the same language the user uses.`;

        let conversationHistory = [];

        sendBtn.addEventListener('click', async () => {
            const query = userInput.value.trim();
            const apiKey = apiKeySlot.value.trim();
            
            if (!query) return;
            if (!apiKey) {
                alert("Please paste your Gemini API Key in the top-right corner slot of the chat widget first!");
                return;
            }
            
            chatHistory.innerHTML += `<div class="message user-msg">${query}</div>`;
            userInput.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message bot-msg';
            thinkingDiv.innerText = 'Thinking...';
            chatHistory.appendChild(thinkingDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            conversationHistory.push({ role: "user", parts: [{ text: query }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        contents: conversationHistory
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    thinkingDiv.style.color = "#ef4444";
                    thinkingDiv.innerText = `Google API Error: ${data.error ? data.error.message : 'Unknown Error'}`;
                    return;
                }

                const aiText = data.candidates[0].content.parts[0].text;
                thinkingDiv.innerText = aiText;
                conversationHistory.push({ role: "model", parts: [{ text: aiText }] });

            } catch (error) {
                thinkingDiv.style.color = "#ef4444";
                thinkingDiv.innerText = "Network connection failed. Verify internet connection or key structure.";
            }
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
        });
    </script>
</body>
</html>
